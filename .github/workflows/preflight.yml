name: preflight

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - ui/mobile-history-v1

permissions:
  contents: read

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,barcode,ocr]"

      - name: Ruff
        run: ruff check backend scripts

      - name: Pytest
        run: python -m pytest backend/tests -q
