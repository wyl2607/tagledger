<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>物流工作台 · TagLedger</title>
  <link rel="stylesheet" href="/static/ui.css">
  <style>
    body { background: #f5f7fa; }
    .workbench { display: grid; gap: 20px; padding-bottom: 48px; }
    .hero-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
      gap: 20px;
      align-items: stretch;
    }
    .hero-copy {
      min-height: 220px;
      display: grid;
      align-content: center;
      gap: 14px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }
    .hero-copy h1 { font-size: 34px; letter-spacing: 0; }
    .role-line { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .scope-note { max-width: 760px; color: var(--muted); line-height: 1.45; font-weight: 800; }
    .stats-panel {
      display: grid;
      gap: 12px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }
    .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-tile {
      min-height: 92px;
      display: grid;
      align-content: center;
      gap: 6px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f9fafb;
    }
    .stat-tile span { color: var(--muted); font-size: 16px; font-weight: 850; }
    .stat-tile strong { font-size: 30px; line-height: 1; }
    .section-head { display: flex; justify-content: space-between; align-items: end; gap: 12px; }
    .section-head h2 { margin: 0; font-size: 24px; }
    .section-head p { margin: 6px 0 0; }
    .quick-path {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .quick-path-item {
      min-height: 92px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
      font-weight: 900;
    }
    .quick-path-item strong { display: block; margin-bottom: 6px; font-size: 20px; }
    .quick-path-item span { display: block; color: var(--muted); font-size: 16px; line-height: 1.35; }
    .module-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .module-card {
      min-height: 148px;
      display: grid;
      align-content: space-between;
      gap: 12px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }
    .module-card:hover, .module-card:focus-visible {
      border-color: var(--orange);
      background: #fffaf7;
      outline: 0;
    }
    .module-card strong { display: block; font-size: 22px; line-height: 1.18; overflow-wrap: anywhere; }
    .module-card span { display: block; margin-top: 8px; color: var(--muted); line-height: 1.42; overflow-wrap: anywhere; }
    .module-card small { color: var(--success); font-size: 15px; font-weight: 950; }
    .topbar-user { display: flex; flex-wrap: wrap; justify-content: flex-end; align-items: center; gap: 8px; }
    .daily-list { display: grid; gap: 8px; }
    .daily-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-weight: 850;
    }
    .daily-item:last-child { border-bottom: 0; }
    @media (max-width: 920px) {
      .hero-panel, .quick-path, .module-grid, .stat-row { grid-template-columns: 1fr; }
      .hero-copy { min-height: 0; padding: 22px; }
      .hero-copy h1 { font-size: 30px; }
      .topbar-user { justify-content: stretch; }
      .topbar-user .nav-button { flex: 1; }
    }
  </style>
</head>
<body data-page="home-workbench">
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">
        <span class="logo">TL</span>
        <span><strong data-i18n="app.name">TagLedger</strong><span data-i18n="workbench.brand">物流工作台</span></span>
      </a>
      <div class="nav-actions topbar-user">
        <div class="lang-switch" aria-label="Language">
          <button type="button" data-locale="en" data-i18n="language.en">EN</button>
          <button type="button" data-locale="de" data-i18n="language.de">DE</button>
          <button type="button" data-locale="zh" data-i18n="language.zh">中文</button>
        </div>
        <a class="nav-button" href="/" data-i18n="nav.portal">中心入口</a>
        <span id="userBadge" class="pill" data-i18n="common.loading">加载中</span>
        <button id="logoutBtn" class="secondary mini" type="button" data-i18n="admin.logout">退出</button>
      </div>
    </div>
  </div>

  <main class="workbench">
    <section class="hero-panel">
      <div class="hero-copy">
        <div class="role-line">
          <span id="roleBadge" class="pill pill-blue" data-i18n="workbench.role.loading">工作台</span>
          <span id="scopeBadge" class="pill" data-i18n="workbench.scope.loading">权限范围</span>
        </div>
        <h1 id="heroTitle" data-i18n="workbench.hero.loading">今天先处理最该处理的单</h1>
        <p id="scopeNote" class="scope-note" data-i18n="workbench.scope.loadingDetail">正在读取账号权限和今日作业范围。</p>
      </div>
      <aside class="stats-panel" aria-label="Stats">
        <h2 data-i18n="workbench.myStats.title">我的近 7 天</h2>
        <div class="stat-row">
          <div class="stat-tile"><span data-i18n="workbench.myStats.scanCount">扫码次数</span><strong id="myScanCount">0</strong></div>
          <div class="stat-tile"><span data-i18n="workbench.myStats.scanQty">扫码数量</span><strong id="myScanQty">0</strong></div>
        </div>
        <div id="globalStats" class="stat-row" hidden>
          <div class="stat-tile"><span data-i18n="workbench.globalStats.orders">全部发货单</span><strong id="globalOrders">0</strong></div>
          <div class="stat-tile"><span data-i18n="workbench.globalStats.scans">全员扫码</span><strong id="globalScans">0</strong></div>
        </div>
      </aside>
    </section>

    <section class="quick-path" aria-label="推荐工作路径">
      <div class="quick-path-item"><strong>发货员</strong><span>手机扫码 → 我的发货单 → 我的近 7 天。</span></div>
      <div class="quick-path-item"><strong>主管</strong><span>出库核对 → 调拨 → 全局看板。</span></div>
      <div class="quick-path-item"><strong>管理者</strong><span>账号权限 → 分配单号 → 审计和统计。</span></div>
    </section>

    <section>
      <div class="section-head">
        <div>
          <h2 data-i18n="workbench.modules.title">可用子页面</h2>
          <p class="muted" data-i18n="workbench.modules.subtitle">入口会按账号等级收起，减少现场误点和越权失败。</p>
        </div>
      </div>
      <div id="moduleGrid" class="module-grid"></div>
    </section>

    <section class="stats-panel" id="dailySection">
      <h2 data-i18n="workbench.daily.title">最近作业</h2>
      <div id="dailyList" class="daily-list"></div>
    </section>
  </main>

  <script src="/static/i18n.js"></script>
  <script src="/static/auth-ui.js"></script>
  <script>
    const tr = (key, vars) => window.I18n ? window.I18n.t(key, vars) : key;
    const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[char]));

    async function requestJson(url, options) {
      const response = await fetch(url, AuthUI.csrfHeaders(options));
      const data = await response.json().catch(() => ({}));
      if (response.status === 401) {
        window.location.href = `/login?next=${encodeURIComponent('/workbench')}`;
        throw new Error('login required');
      }
      if (!response.ok) throw new Error(data.detail || `HTTP ${response.status}`);
      return data;
    }

    function roleLabel(role) {
      return {
        operator: tr('workbench.role.operator'),
        auditor: tr('workbench.role.auditor'),
        supervisor: tr('workbench.role.supervisor'),
        manager: tr('workbench.role.manager'),
        it_admin: tr('workbench.role.it_admin'),
      }[role] || role;
    }

    function moduleLabel(module, field) {
      const key = `workbench.module.${module.id}.${field}`;
      const value = tr(key);
      return value === key ? module[field] : value;
    }

    function moduleGroupLabel(group) {
      const key = `workbench.group.${group || 'work'}`;
      const value = tr(key);
      return value === key ? (group || 'work') : value;
    }

    function renderModules(modules) {
      document.querySelector('#moduleGrid').innerHTML = modules.map((module) => `
        <a class="module-card" href="${esc(module.href)}">
          <small>${esc(moduleGroupLabel(module.group))}</small>
          <div>
            <strong>${esc(moduleLabel(module, 'title'))}</strong>
            <span>${esc(moduleLabel(module, 'description'))}</span>
          </div>
        </a>
      `).join('');
    }

    function renderDaily(rows) {
      if (!rows.length) {
        document.querySelector('#dailyList').innerHTML = `<div class="muted">${esc(tr('workbench.daily.empty'))}</div>`;
        return;
      }
      document.querySelector('#dailyList').innerHTML = rows.map((row) => `
        <div class="daily-item">
          <span>${esc(row.date)}</span>
          <strong>${esc(tr('workbench.daily.line', { count: row.scan_count, qty: row.quantity }))}</strong>
        </div>
      `).join('');
    }

    async function loadWorkbench() {
      const payload = await requestJson('/api/workbench');
      const user = payload.user;
      const allowed = payload.scope.allowed_order_numbers;
      document.querySelector('#userBadge').textContent = `${user.display_name || user.username} · ${roleLabel(user.role)}`;
      document.querySelector('#roleBadge').textContent = roleLabel(user.role);
      document.querySelector('#scopeBadge').textContent = allowed
        ? tr('workbench.scope.assigned', { orders: allowed.join(', ') || tr('common.none') })
        : tr('workbench.scope.global');
      document.querySelector('#heroTitle').textContent = allowed
        ? tr('workbench.hero.operator')
        : tr('workbench.hero.manager');
      document.querySelector('#scopeNote').textContent = allowed
        ? tr('workbench.scope.assignedDetail', { orders: allowed.join(', ') || tr('common.none') })
        : tr('workbench.scope.globalDetail');
      document.querySelector('#myScanCount').textContent = payload.my_stats.scan_count;
      document.querySelector('#myScanQty').textContent = payload.my_stats.scan_quantity;
      if (payload.global_stats) {
        document.querySelector('#globalStats').hidden = false;
        document.querySelector('#globalOrders').textContent = payload.global_stats.order_count;
        document.querySelector('#globalScans').textContent = payload.global_stats.scan_count;
      }
      renderModules(payload.modules || []);
      renderDaily(payload.my_stats.daily || []);
    }

    document.querySelector('#logoutBtn').addEventListener('click', async () => {
      await requestJson('/api/auth/logout', { method: 'POST' }).catch(() => {});
      window.location.href = '/login';
    });

    function bootWorkbench() {
      loadWorkbench().catch((error) => {
      document.querySelector('#scopeNote').textContent = error.message;
      });
    }

    I18n.init().then(bootWorkbench);
    window.addEventListener('i18n:change', bootWorkbench);
  </script>
</body>
</html>
