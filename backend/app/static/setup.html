<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Setup - TagLedger</title>
  <link rel="stylesheet" href="/static/ui.css">
  <style>
    body { background: #f7f8fa; }
    .auth-shell { max-width: 600px; margin: 0 auto; padding: 42px 24px; display: grid; gap: 18px; }
    .auth-card { display: grid; gap: 18px; padding: 24px; border: 1px solid var(--line); border-radius: 8px; background: #fff; box-shadow: var(--shadow); }
    .auth-card h1 { margin: 0; font-size: 30px; }
    .form-grid { display: grid; gap: 14px; }
    .status-line { min-height: 24px; color: var(--muted); font-weight: 850; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">
        <span class="logo">TL</span>
        <span><strong data-i18n="app.name">TagLedger</strong><span data-i18n="app.project">Field Intake</span></span>
      </a>
      <div class="nav-actions">
        <div class="lang-switch" aria-label="Language">
          <button type="button" data-locale="en" data-i18n="language.en">EN</button>
          <button type="button" data-locale="de" data-i18n="language.de">DE</button>
          <button type="button" data-locale="zh" data-i18n="language.zh">中文</button>
        </div>
        <a class="nav-button" href="/login" data-i18n="auth.login.title">登录</a>
      </div>
    </div>
  </div>

  <main class="auth-shell">
    <section class="auth-card">
      <div>
        <h1 data-i18n="auth.setup.title">初始化管理账号</h1>
        <p class="muted" data-i18n="auth.setup.subtitle">只在第一次安装时使用。密码至少 10 位，创建后请用该账号登录。</p>
      </div>
      <form id="setupForm" class="form-grid">
        <div>
          <label for="username" data-i18n="auth.setup.username">管理账号</label>
          <input id="username" autocomplete="username" required>
        </div>
        <div>
          <label for="displayName" data-i18n="auth.setup.displayName">显示名</label>
          <input id="displayName" autocomplete="name">
        </div>
        <div>
          <label for="password" data-i18n="auth.setup.password">密码</label>
          <input id="password" type="password" autocomplete="new-password" required minlength="10">
        </div>
        <button id="submitBtn" type="submit" data-i18n="auth.setup.submit">创建第一个管理账号</button>
      </form>
      <div id="status" class="status-line" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script src="/static/i18n.js"></script>
  <script src="/static/auth-ui.js"></script>
  <script>
    const statusNode = document.querySelector('#status');
    const form = document.querySelector('#setupForm');
    const submitBtn = document.querySelector('#submitBtn');
    const tr = (key, vars) => window.I18n ? window.I18n.t(key, vars) : key;
    const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));

    async function requestJson(url, options) {
      const response = await fetch(url, AuthUI.csrfHeaders(options));
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.detail || tr('auth.setup.failed', { status: response.status }));
      return data;
    }

    async function loadSetupStatus() {
      try {
        const payload = await requestJson('/api/auth/setup-status');
        if (payload.initialized) {
          form.hidden = true;
          statusNode.innerHTML = esc(tr('auth.setup.done', { login: '/login' })).replace('/login', '<a href="/login">/login</a>');
        }
      } catch {
        statusNode.textContent = tr('auth.setup.loadFailed');
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      submitBtn.disabled = true;
      statusNode.textContent = '';
      try {
        await requestJson('/api/auth/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.querySelector('#username').value,
            display_name: document.querySelector('#displayName').value || tr('auth.setup.defaultDisplayName'),
            password: document.querySelector('#password').value,
          }),
        });
        window.location.href = '/admin';
      } catch (error) {
        statusNode.textContent = error.message || tr('auth.setup.failed', { status: '-' });
      } finally {
        submitBtn.disabled = false;
      }
    });

    I18n.init().then(loadSetupStatus);
  </script>
</body>
</html>
