<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>出库核对 · TagLedger</title>
  <link rel="stylesheet" href="/static/ui.css">
  <style>
    body { background: #f5f7fa; }
    main.outbound-page { display: grid; gap: 16px; padding-bottom: 48px; }
    .outbound-tools { display: grid; grid-template-columns: minmax(0, 1.12fr) minmax(320px, .88fr); gap: 16px; align-items: start; }
    table { width: 100%; border-collapse: collapse; min-width: 920px; }
    th, td { border-bottom: 1px solid var(--line); padding: 8px 10px; text-align: left; vertical-align: top; }
    th { background: var(--soft); font-weight: 950; }
    .table-wrap { overflow: auto; }
    .kpis { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .kpi { border: 1px solid var(--line); border-radius: 8px; padding: 14px; background: #fff; }
    .kpi span { display: block; color: var(--muted); }
    .kpi strong { font-size: 28px; }
    .order-picker { max-height: 360px; display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; overflow: auto; padding-right: 4px; }
    .order-choice { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line); border-radius: 999px; padding: 8px 12px; background: #fff; font-weight: 850; }
    .scan-result { margin-top: 12px; border-radius: 16px; border: 1px solid var(--line); background: #fff; padding: 16px; }
    .scan-ok { border-color: #22c55e; background: #f0fdf4; }
    .scan-miss { border-color: #f59e0b; background: #fffbeb; }
    .scan-none { border-color: #ef4444; background: #fef2f2; }
    .empty-state { border-left: 8px solid var(--warning); }
    .status-matched { color: #15803d; font-weight: 950; }
    .status-over_shipped, .status-shipping_extra { color: #b45309; font-weight: 950; }
    .status-under_shipped, .status-cutting_missing_shipping { color: #b91c1c; font-weight: 950; }
    @media (max-width: 900px) {
      .outbound-tools, .kpis { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="outbound">
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/workbench"><span class="logo">TL</span><span><strong data-i18n="outbound.page.title">出库核对</strong><span data-i18n="outbound.page.brandSub">剪料表 / 发货单</span></span></a>
      <div class="nav-actions">
        <div class="lang-switch" aria-label="Language">
          <button type="button" data-locale="en" data-i18n="language.en">EN</button>
          <button type="button" data-locale="de" data-i18n="language.de">DE</button>
          <button type="button" data-locale="zh" data-i18n="language.zh">中文</button>
        </div>
        <a class="nav-button" href="/workbench" data-i18n="workbench.brand">工作台</a>
        <a class="nav-button" href="/mobile" data-i18n="nav.mobile">手机</a>
        <a class="nav-button" href="/outbound" aria-current="page" data-i18n="nav.outbound">出库核对</a>
        <a class="nav-button" href="/dashboard" data-i18n="nav.dashboard">看板</a>
        <a class="nav-button" href="/history" data-i18n="nav.history">历史</a>
      </div>
    </div>
  </div>
  <header class="page-head">
    <h1 data-i18n="outbound.page.title">出库核对</h1>
    <p class="muted" data-i18n="outbound.page.subtitle">使用发货单后两个工作表：多物料订单发货单 + 拣货单。输入配件编码 / 瑞云料号 / SKU 查询对应出库单。</p>
  </header>
  <main class="outbound-page">
    <div class="outbound-tools">
    <section class="card">
      <h2 data-i18n="outbound.page.orders.title">当前可核对出库单号</h2>
      <p class="muted" data-i18n="outbound.page.orders.subtitle">发货员账号只会显示分配给自己的单号；主管和管理者可以选择多个单号做整体核对。</p>
      <div class="actions">
        <button id="selectAllOrdersBtn" class="secondary" type="button" data-i18n="common.all">全选</button>
        <button id="clearOrdersBtn" class="secondary" type="button" data-i18n="common.clear">清空</button>
      </div>
      <div id="orderPicker" class="order-picker"></div>
    </section>
    <section class="card">
      <h2 data-i18n="outbound.page.query.button">扫描/查询</h2>
      <label for="codeQuery" data-i18n="outbound.page.query.label">配件编码 / 瑞云料号 / SKU</label>
      <div class="actions">
        <input id="codeQuery" data-i18n-placeholder="outbound.page.query.placeholder" placeholder="例如 C.P.XS.000142004 或 MTL24LUM1US02">
        <button id="queryBtn" type="button" data-i18n="outbound.page.query.button">扫描/查询</button>
      </div>
      <div id="queryResult" class="status"></div>
    </section>
    </div>
    <section class="card">
      <h2 data-i18n="outbound.page.summary.title">总览</h2>
      <div class="kpis" id="kpis"></div>
      <div class="status" id="orderSummary"></div>
    </section>
    <section class="card">
      <h2 data-i18n="outbound.page.parts.title">按备件编码核对数量</h2>
      <div class="table-wrap"><table><thead><tr><th data-i18n="outbound.page.parts.code">备件编码</th><th data-i18n="outbound.page.parts.name">备件名称</th><th data-i18n="outbound.page.parts.cutting">剪料数量</th><th data-i18n="outbound.page.parts.shipping">发货数量</th><th data-i18n="outbound.page.parts.diff">差异</th><th data-i18n="outbound.page.parts.status">状态</th></tr></thead><tbody id="partRows"></tbody></table></div>
    </section>
  </main>
  <script src="/static/i18n.js"></script>
  <script>
    const tr = (key, vars) => window.I18n ? window.I18n.t(key, vars) : key;
    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    const displayValue = (value, fallback = '-') => (value === null || value === undefined || value === '' ? fallback : value);
    const statusKey = { matched: 'outbound.page.status.matched', over_shipped: 'outbound.page.status.overShipped', under_shipped: 'outbound.page.status.underShipped', shipping_extra: 'outbound.page.status.shippingExtra', cutting_missing_shipping: 'outbound.page.status.cuttingMissing', quantity_unreadable: 'outbound.page.status.quantityUnreadable' };
    let latestSummary = null;
    async function requestJson(url) {
      const response = await fetch(url);
      if (response.status === 401) {
        window.location.href = `/login?next=${encodeURIComponent(window.location.pathname)}`;
        throw new Error('login required');
      }
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    }
    function renderKpis(payload) {
      const counts = payload.counts || {};
      const partStatus = counts.part_status || {};
      document.querySelector('#kpis').innerHTML = `
        <div class="kpi"><span>${escapeHtml(tr('outbound.page.kpi.cuttingRows'))}</span><strong>${counts.cutting_part_rows || 0}</strong></div>
        <div class="kpi"><span>${escapeHtml(tr('outbound.page.kpi.shippingItems'))}</span><strong>${counts.shipping_items || 0}</strong></div>
        <div class="kpi"><span>${escapeHtml(tr('outbound.page.kpi.orders'))}</span><strong>${(payload.order_numbers?.shipping || []).length}</strong></div>
        <div class="kpi"><span>${escapeHtml(tr('outbound.page.kpi.exceptions'))}</span><strong>${(payload.part_rows || []).filter((row) => row.status !== 'matched').length}</strong></div>
      `;
      document.querySelector('#orderSummary').textContent = tr('outbound.page.summary.line', {
        note: payload.order_numbers?.note || '',
        orders: (payload.order_numbers?.shipping || []).join(', ') || tr('common.none'),
        matched: partStatus.matched || 0,
        over: partStatus.over_shipped || 0,
        under: partStatus.under_shipped || 0,
        extra: partStatus.shipping_extra || 0,
        missing: partStatus.cutting_missing_shipping || 0,
      });
    }
    function selectedOrders() {
      return Array.from(document.querySelectorAll('[data-order-choice]:checked')).map((node) => node.value);
    }
    function renderOrderPicker(orderNumbers) {
      if (!(orderNumbers || []).length) {
        document.querySelector('#orderPicker').innerHTML = `<div class="alert alert-yellow empty-state"><strong class="alert-title">${escapeHtml(tr('outbound.page.empty.title'))}</strong>${escapeHtml(tr('outbound.page.empty.detail'))}</div>`;
        document.querySelector('#selectAllOrdersBtn').disabled = true;
        document.querySelector('#clearOrdersBtn').disabled = true;
        return;
      }
      document.querySelector('#orderPicker').innerHTML = (orderNumbers || []).map((order) => `
        <label class="order-choice"><input type="checkbox" data-order-choice value="${escapeHtml(order)}" ${(orderNumbers || []).length === 1 ? 'checked' : ''}>${escapeHtml(order)}</label>
      `).join('');
      if ((orderNumbers || []).length <= 1) {
        document.querySelector('#selectAllOrdersBtn').disabled = true;
        document.querySelector('#clearOrdersBtn').disabled = true;
      }
    }
    function renderPartRows(rows) {
      document.querySelector('#partRows').innerHTML = rows.map((row) => `
        <tr>
          <td>${escapeHtml(row.part_code)}</td>
          <td>${escapeHtml(displayValue(row.name))}</td>
          <td>${escapeHtml(displayValue(row.cutting_qty))}</td>
          <td>${escapeHtml(displayValue(row.shipping_qty))}</td>
          <td>${escapeHtml(displayValue(row.difference))}</td>
          <td class="status-${escapeHtml(row.status)}">${escapeHtml(tr(statusKey[row.status] || 'outbound.page.status.unknown'))}</td>
        </tr>
      `).join('');
    }
    function renderQuery(payload) {
      const rows = payload.shipping_orders || [];
      if (!rows.length) {
        document.querySelector('#queryResult').innerHTML = `<div class="scan-result scan-none"><strong>${escapeHtml(tr('outbound.page.query.noneTitle'))}</strong><br>${escapeHtml(tr('outbound.page.query.noneDetail'))}</div>`;
        return;
      }
      const selected = payload.selected_order_numbers || [];
      const matchedSelected = payload.matching_selected_orders || [];
      const resultClass = selected.length ? (payload.belongs_to_selected ? 'scan-ok' : 'scan-miss') : 'scan-result';
      const resultTitle = !selected.length
        ? tr('outbound.page.query.needSelection')
        : (payload.belongs_to_selected ? tr('outbound.page.query.belongs') : tr('outbound.page.query.notBelongs'));
      const selectedHtml = matchedSelected.length
        ? `<h3>${escapeHtml(tr('outbound.page.query.selectedHits'))}</h3>${matchedSelected.map((row) => `<div>${escapeHtml(tr('outbound.page.query.orderLine', { order: row.order_no, qty: displayValue(row.quantity), code: row.part_code, name: displayValue(row.name) }))}</div>`).join('')}`
        : '';
      const allHtml = rows.map((row) => `<div>${escapeHtml(tr('outbound.page.query.orderLine', { order: row.order_no, qty: displayValue(row.quantity), code: row.part_code, name: displayValue(row.name) }))}</div>`).join('');
      const totalHtml = (payload.rows || []).map((row) => `<div>${escapeHtml(tr('outbound.page.query.totalLine', { cutting: displayValue(row.cutting_qty), shipping: displayValue(row.shipping_qty), diff: displayValue(row.difference), status: tr(statusKey[row.status] || 'outbound.page.status.unknown') }))}</div>`).join('');
      document.querySelector('#queryResult').innerHTML = `<div class="scan-result ${resultClass}"><strong>${escapeHtml(resultTitle)}</strong>${selectedHtml}<h3>${escapeHtml(tr('outbound.page.query.allHits'))}</h3>${allHtml}${totalHtml ? `<h3>${escapeHtml(tr('outbound.page.query.totals'))}</h3>${totalHtml}` : ''}</div>`;
    }
    async function loadSummary() {
      const payload = await requestJson('/api/outbound/summary');
      latestSummary = payload;
      renderKpis(payload);
      renderOrderPicker(payload.order_numbers?.shipping || []);
      renderPartRows(payload.part_rows || []);
    }
    document.querySelector('#queryBtn').addEventListener('click', async () => {
      const code = document.querySelector('#codeQuery').value.trim();
      if (!code) return;
      const params = new URLSearchParams({ code });
      for (const order of selectedOrders()) params.append('order_no', order);
      renderQuery(await requestJson(`/api/outbound/query?${params.toString()}`));
    });
    document.querySelector('#codeQuery').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') document.querySelector('#queryBtn').click();
    });
    document.querySelector('#selectAllOrdersBtn').addEventListener('click', () => {
      document.querySelectorAll('[data-order-choice]').forEach((node) => { node.checked = true; });
    });
    document.querySelector('#clearOrdersBtn').addEventListener('click', () => {
      document.querySelectorAll('[data-order-choice]').forEach((node) => { node.checked = false; });
    });
    function bootOutbound() {
      loadSummary().catch((error) => { document.querySelector('#orderSummary').textContent = error.message; });
    }
    I18n.init().then(bootOutbound);
    window.addEventListener('i18n:change', bootOutbound);
  </script>
</body>
</html>
