<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TagLedger 统计面板</title>
  <link rel="stylesheet" href="/static/ui.css">
  <style>
    body { background: #f5f7fa; }
    .dashboard-page { display: grid; gap: 18px; padding-bottom: 48px; }
    .dashboard-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
    }
    .dashboard-head h1 { font-size: 34px; }
    .dashboard-head p { max-width: 760px; margin: 8px 0 0; font-weight: 800; }
    .updated { color: var(--muted); font-weight: 900; text-align: right; }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .kpi {
      min-height: 126px;
      display: grid;
      align-content: center;
      gap: 10px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }
    .kpi span { color: var(--muted); font-weight: 900; line-height: 1.25; }
    .kpi strong { font-size: 36px; line-height: 1; }
    .dashboard-grid { display: grid; grid-template-columns: minmax(0, 1.25fr) minmax(300px, .75fr); gap: 14px; }
    .panel-flat {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }
    .panel-flat h2 { margin-bottom: 10px; font-size: 24px; }
    .metric-list { display: grid; gap: 10px; }
    .metric-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 52px;
      border-bottom: 1px solid var(--line);
      font-weight: 900;
    }
    .metric-row:last-child { border-bottom: 0; }
    .metric-row span { color: var(--muted); overflow-wrap: anywhere; }
    .metric-row strong { font-size: 22px; }
    .chart {
      width: 100%;
      min-height: 250px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f9fafb;
    }
    .status-counts { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .status-counts .status-pill { width: 100%; justify-content: space-between; gap: 12px; border: 0; }
    @media (max-width: 960px) {
      .dashboard-head, .dashboard-grid, .kpi-grid { grid-template-columns: 1fr; }
      .dashboard-head h1 { font-size: 30px; }
      .updated { text-align: left; }
    }
  </style>
</head>
<body data-page="dashboard">
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">
        <span class="logo">TL</span>
        <span><strong data-i18n="app.name">TagLedger</strong><span data-i18n="dashboard.brand">统计面板</span></span>
      </a>
      <div class="nav-actions">
        <div class="lang-switch" aria-label="Language">
          <button type="button" data-locale="en" data-i18n="language.en">EN</button>
          <button type="button" data-locale="de" data-i18n="language.de">DE</button>
          <button type="button" data-locale="zh" data-i18n="language.zh">中文</button>
        </div>
        <a class="nav-button" href="/" data-i18n="nav.portal">中心入口</a>
        <a class="nav-button" href="/workbench" data-i18n="workbench.brand">工作台</a>
        <a class="nav-button" href="/dashboard" aria-current="page" data-i18n="nav.dashboard">看板</a>
        <a class="nav-button" href="/outbound" data-i18n="nav.outbound">出库核对</a>
        <a class="nav-button" href="/transfers" data-i18n="nav.transfers">调拨</a>
      </div>
    </div>
  </div>

  <main class="dashboard-page">
    <section class="dashboard-head">
      <div>
        <h1 data-i18n="dashboard.title">运营统计</h1>
        <p class="muted" data-i18n="dashboard.subtitle">把库存、库位、出库扫码和录入质量放在一屏，先看哪里缺货、哪里在出、最近有没有异常。</p>
      </div>
      <div class="updated" id="updatedAt" data-i18n="common.loading">加载中</div>
    </section>

    <section class="kpi-grid" aria-label="Inventory KPIs">
      <div class="kpi"><span data-i18n="dashboard.kpi.totalQty">库存总数</span><strong id="inventoryTotalQty">0</strong></div>
      <div class="kpi"><span data-i18n="dashboard.kpi.activeLocations">可用库位</span><strong id="activeLocations">0</strong></div>
      <div class="kpi"><span data-i18n="dashboard.kpi.zeroStock">空库位</span><strong id="zeroStockLocations">0</strong></div>
      <div class="kpi"><span data-i18n="dashboard.kpi.activeOutbound">出库中数量</span><strong id="activeOutboundQty">0</strong></div>
    </section>

    <section class="dashboard-grid">
      <div class="panel-flat">
        <h2 data-i18n="dashboard.section.throughput">近 30 天录入趋势</h2>
        <svg class="chart" id="throughputChart" role="img" aria-label="Daily throughput chart"></svg>
      </div>
      <div class="panel-flat">
        <h2 data-i18n="dashboard.section.inventory">库存与库位</h2>
        <div class="metric-list">
          <div class="metric-row"><span data-i18n="dashboard.metric.partCount">物料种类</span><strong id="partCount">0</strong></div>
          <div class="metric-row"><span data-i18n="dashboard.metric.locationCount">全部库位</span><strong id="locationCount">0</strong></div>
          <div class="metric-row"><span data-i18n="dashboard.metric.disabledLocations">停用库位</span><strong id="disabledLocations">0</strong></div>
          <div class="metric-row"><span data-i18n="dashboard.metric.restockNeeded">需要补货</span><strong id="restockNeeded">0</strong></div>
        </div>
      </div>
    </section>

    <section class="dashboard-grid">
      <div class="panel-flat">
        <h2 data-i18n="dashboard.section.movements">最近库存流水</h2>
        <div class="metric-list">
          <div class="metric-row"><span data-i18n="dashboard.metric.recentMovements">流水条数</span><strong id="recentMovementCount">0</strong></div>
          <div class="metric-row"><span data-i18n="dashboard.metric.inboundQty">入库数量</span><strong id="recentInboundQty">0</strong></div>
          <div class="metric-row"><span data-i18n="dashboard.metric.outboundQty">扣减数量</span><strong id="recentOutboundQty">0</strong></div>
          <div class="metric-row"><span data-i18n="dashboard.metric.transferQty">调拨数量</span><strong id="recentTransferQty">0</strong></div>
        </div>
      </div>
      <div class="panel-flat">
        <h2 data-i18n="dashboard.section.quality">录入质量</h2>
        <div class="metric-list">
          <div class="metric-row"><span data-i18n="dashboard.metric.confirmed">已确认记录</span><strong id="confirmedCount">0</strong></div>
          <div class="metric-row"><span data-i18n="dashboard.metric.duplicates">重复拦截</span><strong id="duplicatesCaught">0</strong></div>
          <div class="metric-row"><span data-i18n="dashboard.metric.savedHours">节省小时</span><strong id="savedHours">0</strong></div>
          <div class="metric-row"><span data-i18n="dashboard.metric.ocrReview">需复核 OCR</span><strong id="needsReviewCount">0</strong></div>
        </div>
      </div>
    </section>

    <section class="panel-flat">
      <h2 data-i18n="dashboard.section.status">记录状态分布</h2>
      <div class="status-counts" id="statusCounts"></div>
    </section>
  </main>

  <script src="/static/auth-ui.js"></script>
  <script src="/static/i18n.js"></script>
  <script>
    const state = { lastLoadedAt: null };
    const tr = (key, vars) => window.I18n ? window.I18n.t(key, vars) : key;
    const fmt = (value) => new Intl.NumberFormat(document.documentElement.lang || 'zh', { maximumFractionDigits: 1 }).format(value || 0);

    async function requestJson(url) {
      return AuthUI.fetchJson(url);
    }

    function renderLineChart(rows) {
      const svg = document.querySelector('#throughputChart');
      const width = 760;
      const height = 250;
      const pad = 30;
      const values = rows.map((row) => Number(row.uploaded || 0));
      const maxValue = Math.max(1, ...values);
      const points = rows.map((row, index) => {
        const x = pad + (rows.length <= 1 ? 0 : (index / (rows.length - 1)) * (width - pad * 2));
        const y = height - pad - (Number(row.uploaded || 0) / maxValue) * (height - pad * 2);
        return [x, y];
      });
      const path = points.map(([x, y], index) => `${index ? 'L' : 'M'} ${x.toFixed(1)} ${y.toFixed(1)}`).join(' ');
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.innerHTML = `
        <rect width="${width}" height="${height}" rx="8" fill="#f9fafb"></rect>
        <path d="${path}" fill="none" stroke="#0284c7" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>
        ${points.map(([x, y]) => `<circle cx="${x}" cy="${y}" r="4" fill="#ff6b35"></circle>`).join('')}
      `;
    }

    function renderStatusCounts(byStatus) {
      const container = document.querySelector('#statusCounts');
      const entries = Object.entries(byStatus || {});
      container.innerHTML = entries.length ? entries.map(([status, count]) => `
        <span class="status-pill status-${status.replace(/[^a-z_]/g, '')}"><span>${status}</span><strong>${fmt(count)}</strong></span>
      `).join('') : `<span class="muted">${tr('common.none')}</span>`;
    }

    function updateTicker() {
      if (!state.lastLoadedAt) return;
      const seconds = Math.max(Math.floor((Date.now() - state.lastLoadedAt) / 1000), 0);
      document.querySelector('#updatedAt').textContent = tr('dashboard.updatedAgo', { seconds });
    }

    async function loadDashboard() {
      const user = await AuthUI.currentUser();
      if (!AuthUI.hasCapability(user, 'can_view_global_stats')) {
        document.querySelector('#updatedAt').textContent = '无权查看全局统计';
        return;
      }
      const payload = await requestJson('/api/metrics/all?days=30');
      const logistics = payload.logistics || {};
      const inventory = logistics.inventory || {};
      const movements = logistics.movements || {};
      const outbound = logistics.outbound || {};

      document.querySelector('#inventoryTotalQty').textContent = fmt(inventory.total_quantity);
      document.querySelector('#activeLocations').textContent = fmt(inventory.active_location_count);
      document.querySelector('#zeroStockLocations').textContent = fmt(inventory.zero_stock_location_count);
      document.querySelector('#activeOutboundQty').textContent = fmt(outbound.active_scan_quantity);
      document.querySelector('#partCount').textContent = fmt(inventory.part_count);
      document.querySelector('#locationCount').textContent = fmt(inventory.location_count);
      document.querySelector('#disabledLocations').textContent = fmt(inventory.disabled_location_count);
      document.querySelector('#restockNeeded').textContent = fmt(inventory.restock_needed_count);
      document.querySelector('#recentMovementCount').textContent = fmt(movements.movement_count);
      document.querySelector('#recentInboundQty').textContent = fmt(movements.inbound_quantity);
      document.querySelector('#recentOutboundQty').textContent = fmt(movements.outbound_quantity);
      document.querySelector('#recentTransferQty').textContent = fmt(movements.transfer_quantity);
      document.querySelector('#confirmedCount').textContent = fmt(payload.summary.confirmed_count);
      document.querySelector('#duplicatesCaught').textContent = fmt(payload.summary.duplicates_caught);
      document.querySelector('#savedHours').textContent = fmt((payload.savings.total_saved_minutes || 0) / 60);
      document.querySelector('#needsReviewCount').textContent = fmt(payload.ocr_quality.needs_review_count);
      renderStatusCounts(payload.summary.by_status);
      renderLineChart(payload.throughput || []);
      state.lastLoadedAt = Date.now();
      updateTicker();
    }

    I18n.init().then(() => {
      loadDashboard().catch((error) => {
        document.querySelector('#updatedAt').textContent = tr('dashboard.loadFailed', { message: error.message });
      });
    });
    window.setInterval(loadDashboard, 30000);
    window.setInterval(updateTicker, 1000);
  </script>
</body>
</html>
