<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>库存与库位 · TagLedger</title>
  <link rel="stylesheet" href="/static/ui.css">
  <style>
    body { background: #f5f7fa; }
    .inventory-page { display: grid; gap: 18px; padding-bottom: 48px; }
    .inventory-head { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 14px; align-items: end; }
    .inventory-head h1 { font-size: 34px; }
    .inventory-head p { max-width: 820px; margin-top: 8px; font-weight: 800; }
    .filters, .panel { padding: 18px; border: 1px solid var(--line); border-radius: 8px; background: #fff; box-shadow: var(--shadow); }
    .filters { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; align-items: end; }
    .filters label, .form-grid label { display: grid; gap: 5px; color: var(--muted); font-weight: 900; }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .kpi { min-height: 96px; display: grid; align-content: center; gap: 6px; padding: 14px; border: 1px solid var(--line); border-radius: 8px; background: #fff; box-shadow: var(--shadow); }
    .kpi span { color: var(--muted); font-weight: 900; }
    .kpi strong { font-size: 30px; line-height: 1; }
    .work-grid { display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(340px, .65fr); gap: 14px; align-items: start; }
    .map-shell { display: grid; gap: 14px; margin-top: 14px; }
    .map-zone { display: grid; gap: 12px; padding: 14px; border: 1px solid var(--line); border-radius: 8px; background: #f9fafb; }
    .map-zone h3, .bucket-zone h3 { margin: 0; }
    .map-column { display: grid; gap: 10px; }
    .map-column-title { display: flex; justify-content: space-between; gap: 10px; color: var(--muted); font-weight: 950; }
    .rack-row { display: grid; gap: 8px; padding: 10px; border: 1px solid #d8dee8; border-radius: 8px; background: #fff; }
    .rack-head { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; font-weight: 950; }
    .depth-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(128px, 1fr)); gap: 8px; }
    .map-cell, .bucket-card { min-height: 92px; display: grid; gap: 5px; align-content: start; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; text-align: left; cursor: pointer; }
    .map-cell[aria-selected="true"], .bucket-card[aria-selected="true"] { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255, 107, 53, .16); }
    .map-cell strong, .bucket-card strong { overflow-wrap: anywhere; }
    .cell-metrics { color: var(--muted); font-weight: 900; }
    .badge-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .badge { width: fit-content; padding: 3px 7px; border-radius: 999px; background: #eef2ff; color: #3730a3; font-size: 12px; font-weight: 950; }
    .badge.warn { background: #fef2f2; color: #991b1b; }
    .badge.restock { background: #fff7ed; color: #9a3412; }
    .badge.unresolved { background: #fef3c7; color: #92400e; }
    .bucket-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-top: 14px; }
    .bucket-zone { display: grid; gap: 8px; padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: #f9fafb; }
    .material-list { display: grid; gap: 8px; margin: 12px 0; }
    .material-item { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; padding: 9px; border: 1px solid var(--line); border-radius: 8px; background: #fff; text-align: left; cursor: pointer; }
    .material-item[aria-selected="true"] { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255, 107, 53, .12); }
    .inventory-list { margin-top: 14px; }
    .location-grid { display: grid; gap: 10px; }
    .zone { display: grid; gap: 8px; padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: #f9fafb; }
    .zone h3 { margin: 0; font-size: 18px; }
    .location-card { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; cursor: pointer; }
    .location-card[aria-selected="true"] { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255, 107, 53, .16); }
    .location-card strong { font-size: 18px; overflow-wrap: anywhere; }
    .location-card .meta { color: var(--muted); font-weight: 850; overflow-wrap: anywhere; }
    .qty { font-size: 26px; font-weight: 950; }
    .restock { color: #991b1b; }
    .temporary { color: #1d4ed8; }
    .form-grid { display: grid; gap: 12px; }
    .form-grid button { width: 100%; }
    @media (max-width: 920px) {
      .inventory-head, .filters, .kpi-grid, .work-grid, .bucket-grid { grid-template-columns: 1fr; }
      .inventory-head h1 { font-size: 30px; }
      .depth-grid { grid-template-columns: repeat(auto-fill, minmax(112px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">
        <span class="logo">TL</span>
        <span><strong data-i18n="app.name">TagLedger</strong><span data-i18n="inventory.title">库存与库位</span></span>
      </a>
      <div class="nav-actions">
        <div class="lang-switch" aria-label="Language">
          <button type="button" data-locale="en" data-i18n="language.en">EN</button>
          <button type="button" data-locale="de" data-i18n="language.de">DE</button>
          <button type="button" data-locale="zh" data-i18n="language.zh">中文</button>
        </div>
        <a class="nav-button" href="/" data-i18n="nav.portal">中心入口</a>
        <a class="nav-button" href="/workbench" data-i18n="workbench.brand">工作台</a>
        <a class="nav-button" href="/inbound" data-i18n="nav.inbound">入库</a>
        <a class="nav-button" href="/transfers" data-i18n="nav.transfers">调拨</a>
        <button type="button" class="secondary" id="logoutBtn" data-i18n="admin.logout">退出登录</button>
      </div>
    </div>
  </div>

  <main class="inventory-page" id="inventoryContent" hidden>
    <section class="inventory-head">
      <div>
        <h1 data-i18n="inventory.title">库存与库位</h1>
        <p class="muted" data-i18n="inventory.subtitle">把库存总账和厂区库位图放到一个入口：临时库位用完自动隐藏，永久库位用完保留补货提示，所有修改都会写入流水。</p>
      </div>
      <button type="button" id="refreshBtn" data-i18n="inventory.action.refresh">刷新库存</button>
    </section>

    <section class="filters">
      <label>
        <span data-i18n="inventory.filter.factory">工厂</span>
        <select id="factoryFilter">
          <option value="" data-i18n="common.all">全部</option>
          <option value="factory_a">factory_a</option>
          <option value="factory_b">factory_b</option>
          <option value="factory_c">factory_c</option>
        </select>
      </label>
      <label>
        <span data-i18n="inventory.filter.part">物料</span>
        <input id="partFilter" data-i18n-placeholder="inventory.filter.partPlaceholder" placeholder="料号 / SKU">
      </label>
      <label>
        <span data-i18n="inventory.filter.hidden">隐藏库位</span>
        <select id="hiddenFilter">
          <option value="false" data-i18n="inventory.hidden.visibleOnly">只看可见</option>
          <option value="true" data-i18n="inventory.hidden.include">包含停用/临时空库位</option>
        </select>
      </label>
      <button type="button" id="applyFilterBtn" data-i18n="inventory.action.apply">应用筛选</button>
    </section>

    <section class="kpi-grid" aria-label="Inventory summary">
      <div class="kpi"><span data-i18n="inventory.kpi.visible">可见库位</span><strong id="visibleCount">0</strong></div>
      <div class="kpi"><span data-i18n="inventory.kpi.restock">需补货</span><strong id="restockCount">0</strong></div>
      <div class="kpi"><span data-i18n="inventory.kpi.mixed">混放库位</span><strong id="mixedCount">0</strong></div>
      <div class="kpi"><span data-i18n="inventory.kpi.quantity">可见库存数</span><strong id="totalQty">0</strong></div>
    </section>

    <section class="work-grid">
      <div class="panel">
        <h2 data-i18n="inventory.map.title">厂区库位图</h2>
        <p class="muted" data-i18n="inventory.map.subtitle">A/B 区按列、架、层、depth 展示。点击库位后查看物料明细并发起虚拟调拨。</p>
        <div id="locationMap" class="map-shell" data-map-source="/api/inventory/location-map"></div>
        <div id="locationBuckets" class="bucket-grid"></div>
        <div class="inventory-list">
          <h2 data-i18n="inventory.list.title">库存列表</h2>
          <div id="locationGrid" class="location-grid"></div>
        </div>
      </div>

      <aside class="panel">
        <h2 data-i18n="inventory.editor.title">库位操作</h2>
        <p class="muted" id="selectedInfo" data-i18n="inventory.editor.empty">先选择一个库位。</p>
        <div id="materialDetails" class="material-list"></div>
        <div class="form-grid">
          <label>
            <span data-i18n="inventory.move.target">目标库位</span>
            <input id="moveTarget" data-i18n-placeholder="inventory.move.targetPlaceholder" placeholder="例如 B-C02-032">
          </label>
          <label>
            <span data-i18n="inventory.move.quantity">挪动数量</span>
            <input id="moveQty" type="text" inputmode="numeric" pattern="[0-9]*">
          </label>
          <label>
            <span data-i18n="inventory.move.kind">目标库位类型</span>
            <select id="moveKind">
              <option value="temporary" data-i18n="inventory.kind.temporary">临时</option>
              <option value="permanent" data-i18n="inventory.kind.permanent">永久</option>
            </select>
          </label>
          <label>
            <span data-i18n="inventory.move.reason">挪动原因</span>
            <input id="moveReason" data-i18n-placeholder="inventory.move.reasonPlaceholder" placeholder="整理库位" value="整理库位">
          </label>
          <button type="button" id="moveBtn" data-i18n="inventory.action.move">挪动到目标库位</button>
          <div id="adjustmentPanel" hidden>
            <hr>
            <h3 data-i18n="inventory.adjust.title">主管数量校正</h3>
            <label>
              <span data-i18n="inventory.editor.quantity">校正数量</span>
              <input id="adjustQty" type="text" inputmode="numeric" pattern="[0-9]*">
            </label>
            <label>
              <span data-i18n="inventory.editor.reason">原因</span>
              <input id="adjustReason" data-i18n-placeholder="inventory.editor.reasonPlaceholder" placeholder="盘点 / 纠错 / 临时库位用完">
            </label>
            <button type="button" id="adjustBtn" data-i18n="inventory.action.adjust">写入数量调整</button>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script src="/static/i18n.js"></script>
  <script src="/static/auth-ui.js?v=role-nav"></script>
  <script>
    const tr = (key, vars) => window.I18n ? window.I18n.t(key, vars) : key;
    const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[char]));
    let latestLocationsPayload = null;
    let latestMapPayload = null;
    let selectedCell = null;
    let selectedMaterialKey = null;
    let userCanManageInventory = false;

    function zoneName(locationCode) {
      return String(locationCode || 'LOC').split(/[-_]/)[0] || 'LOC';
    }

    function renderSummary(summary) {
      const visibleCount = (summary.standard_location_count || 0)
        + (summary.temporary_location_count || 0)
        + (summary.upstairs_location_count || 0)
        + (summary.unresolved_location_count || 0);
      document.querySelector('#visibleCount').textContent = visibleCount;
      document.querySelector('#restockCount').textContent = summary.restock_required_count || 0;
      document.querySelector('#mixedCount').textContent = summary.mixed_location_count || 0;
      document.querySelector('#totalQty').textContent = summary.total_quantity || 0;
    }

    function warningBadges(cell, extra = '') {
      const badges = [];
      if (cell.mixed_material_warning) badges.push(`<span class="badge warn">${esc(tr('inventory.warning.mixed'))}</span>`);
      if (cell.restock_required) badges.push(`<span class="badge restock">${esc(tr('inventory.restockRequired'))}</span>`);
      if (extra) badges.push(extra);
      return badges.length ? `<span class="badge-row">${badges.join('')}</span>` : '';
    }

    function isSelectedCell(cell) {
      return selectedCell?.location_code === cell.location_code;
    }

    function renderCellButton(cell, className = 'map-cell', extraBadge = '') {
      return `
        <button type="button" class="${className}" data-location-code="${esc(cell.location_code)}" aria-selected="${isSelectedCell(cell) ? 'true' : 'false'}">
          <strong>${esc(cell.location_code)}</strong>
          <span class="cell-metrics">${esc(cell.total_quantity)} · ${esc(cell.material_count)} ${esc(tr('inventory.cell.materials'))}</span>
          ${warningBadges(cell, extraBadge)}
        </button>
      `;
    }

    function sortedEntries(object, numeric = false) {
      return Object.entries(object || {}).sort(([left], [right]) => {
        if (numeric) return Number(left) - Number(right);
        return String(left).localeCompare(String(right), undefined, { numeric: true });
      });
    }

    function renderMap(payload) {
      const zoneLabels = { A: tr('inventory.zone.a'), B: tr('inventory.zone.b') };
      document.querySelector('#locationMap').innerHTML = ['A', 'B'].map((zoneKey) => {
        const zone = payload?.zones?.[zoneKey] || { columns: {} };
        const columns = sortedEntries(zone.columns);
        return `
          <section class="map-zone" data-zone="${esc(zoneKey)}">
            <h3>${esc(zoneLabels[zoneKey] || zoneKey)}</h3>
            ${columns.length ? columns.map(([columnKey, column]) => `
              <div class="map-column" data-column="${esc(columnKey)}">
                <div class="map-column-title"><span>${esc(tr('inventory.column', { column: columnKey }))}</span></div>
                ${sortedEntries(column.racks, true).map(([rackKey, rack]) => `
                  <div class="rack-row" data-rack="${esc(rackKey)}">
                    <div class="rack-head">
                      <span>${esc(tr('inventory.rack', { rack: rack.rack_index ?? rackKey }))}</span>
                      ${rack.rack_warning ? `<span class="badge warn">${esc(rack.rack_warning_message || tr('inventory.warning.rack'))}</span>` : ''}
                    </div>
                    ${sortedEntries(rack.levels, true).map(([levelKey, level]) => `
                      <div class="depth-grid" data-level="${esc(levelKey)}">
                        ${sortedEntries(level.depths, true).map(([_depthKey, cell]) => renderCellButton(cell)).join('')}
                      </div>
                    `).join('')}
                  </div>
                `).join('')}
              </div>
            `).join('') : `<p class="muted">${esc(tr('inventory.empty'))}</p>`}
          </section>
        `;
      }).join('');
      document.querySelectorAll('.map-cell').forEach((cell) => {
        cell.addEventListener('click', () => selectCellByCode(cell.dataset.locationCode));
      });
    }

    function renderBuckets(buckets) {
      const labels = {
        temporary: tr('inventory.bucket.temporary'),
        upstairs: tr('inventory.bucket.upstairs'),
        unresolved: tr('inventory.bucket.unresolved'),
      };
      document.querySelector('#locationBuckets').innerHTML = ['temporary', 'upstairs', 'unresolved'].map((bucketKey) => {
        const rows = buckets?.[bucketKey] || [];
        const unresolvedBadge = bucketKey === 'unresolved'
          ? `<span class="badge unresolved">${esc(tr('inventory.warning.unresolved'))}</span>`
          : '';
        return `
          <section class="bucket-zone" data-bucket="${esc(bucketKey)}">
            <h3>${esc(labels[bucketKey])}</h3>
            ${rows.length ? rows.map((cell) => renderCellButton(cell, 'bucket-card', unresolvedBadge)).join('') : `<p class="muted">${esc(tr('inventory.empty'))}</p>`}
          </section>
        `;
      }).join('');
      document.querySelectorAll('.bucket-card').forEach((cell) => {
        cell.addEventListener('click', () => selectCellByCode(cell.dataset.locationCode));
      });
    }

    function renderLocations(locations) {
      if (!locations.length) {
        document.querySelector('#locationGrid').innerHTML = `<p class="muted">${esc(tr('inventory.empty'))}</p>`;
        return;
      }
      const zones = new Map();
      locations.forEach((location) => {
        const zone = zoneName(location.location_code);
        if (!zones.has(zone)) zones.set(zone, []);
        zones.get(zone).push(location);
      });
      const metaLine = (location) => {
        const parts = [esc(location.part_key)];
        if (location.factory_id && location.factory_id !== 'factory_a') parts.push(esc(location.factory_id));
        if (location.location_kind === 'temporary') {
          parts.push(`<span class="temporary">${esc(tr('inventory.kind.temporary'))}</span>`);
        }
        return parts.join(' · ');
      };
      document.querySelector('#locationGrid').innerHTML = [...zones.entries()].map(([zone, rows]) => `
        <section class="zone">
          <h3>${esc(zone)}</h3>
          ${rows.map((location) => `
            <button type="button" class="location-card" data-location-id="${esc(location.id)}" aria-selected="${selectedCell?.location_code === location.location_code && selectedMaterialKey === location.part_key ? 'true' : 'false'}">
              <span>
                <strong>${esc(location.location_code)}</strong>
                <span class="meta">${metaLine(location)}</span>
                ${location.restock_required ? `<span class="meta restock">${esc(tr('inventory.restockRequired'))}</span>` : ''}
              </span>
              <span class="qty">${esc(location.quantity)}</span>
            </button>
          `).join('')}
        </section>
      `).join('');
      document.querySelectorAll('.location-card').forEach((card) => {
        card.addEventListener('click', () => selectLocation(Number(card.dataset.locationId)));
      });
    }

    function selectLocation(id) {
      const row = (latestLocationsPayload?.locations || []).find((item) => Number(item.id) === id) || null;
      if (!row) {
        selectCell(null);
        return;
      }
      selectCell(findCellByCode(row.location_code), row.part_key);
    }

    function allMapCells() {
      const zones = latestMapPayload?.zones || {};
      const standardCells = Object.values(zones).flatMap((zone) => (
        Object.values(zone.columns || {}).flatMap((column) => (
          Object.values(column.racks || {}).flatMap((rack) => (
            Object.values(rack.levels || {}).flatMap((level) => Object.values(level.depths || {}))
          ))
        ))
      ));
      const bucketCells = Object.values(latestMapPayload?.buckets || {}).flat();
      return [...standardCells, ...bucketCells];
    }

    function findCellByCode(locationCode) {
      return allMapCells().find((cell) => cell.location_code === locationCode) || null;
    }

    function sourceRowForSelection() {
      if (!selectedCell) return null;
      const rows = latestLocationsPayload?.locations || [];
      const matches = rows.filter((row) => row.location_code === selectedCell.location_code);
      if (selectedMaterialKey) {
        return matches.find((row) => row.part_key === selectedMaterialKey) || null;
      }
      if (matches.length === 1) return matches[0];
      return null;
    }

    function renderSelectedDetails() {
      if (!selectedCell) {
        document.querySelector('#selectedInfo').textContent = tr('inventory.editor.empty');
        document.querySelector('#materialDetails').innerHTML = '';
        document.querySelector('#adjustQty').value = '';
        document.querySelector('#moveQty').value = '';
        return;
      }
      const sourceRow = sourceRowForSelection();
      document.querySelector('#selectedInfo').textContent = `${selectedCell.location_code} · ${selectedCell.total_quantity} · ${selectedCell.material_count} ${tr('inventory.cell.materials')}`;
      document.querySelector('#materialDetails').innerHTML = (selectedCell.materials || []).map((material) => `
        <button type="button" class="material-item" data-part-key="${esc(material.part_key)}" aria-selected="${selectedMaterialKey === material.part_key ? 'true' : 'false'}">
          <span>
            <strong>${esc(material.part_key)}</strong>
            <span class="meta">${esc(material.part_name || '')}</span>
          </span>
          <strong>${esc(material.quantity)}</strong>
        </button>
      `).join('');
      document.querySelectorAll('.material-item').forEach((item) => {
        item.addEventListener('click', () => selectCell(selectedCell, item.dataset.partKey));
      });
      document.querySelector('#adjustQty').value = sourceRow ? sourceRow.quantity : '';
      document.querySelector('#moveQty').value = sourceRow ? '1' : '';
    }

    function selectCell(cell, partKey = null) {
      selectedCell = cell || null;
      selectedMaterialKey = partKey || (cell?.materials?.length === 1 ? cell.materials[0].part_key : null);
      renderSelectedDetails();
      renderMap(latestMapPayload || {});
      renderBuckets(latestMapPayload?.buckets || {});
      renderLocations(latestLocationsPayload?.locations || []);
    }

    function selectCellByCode(locationCode) {
      selectCell(findCellByCode(locationCode));
    }

    async function loadInventory() {
      const params = new URLSearchParams();
      const factory = document.querySelector('#factoryFilter').value;
      const part = document.querySelector('#partFilter').value.trim();
      if (factory) params.set('factory_id', factory);
      if (part) params.set('part_key', part);
      params.set('include_hidden', document.querySelector('#hiddenFilter').value);
      const mapParams = new URLSearchParams();
      if (factory) mapParams.set('factory_id', factory);
      mapParams.set('include_hidden', document.querySelector('#hiddenFilter').value);
      latestLocationsPayload = await AuthUI.fetchJson(`/api/inventory/locations?${params.toString()}`);
      latestMapPayload = await AuthUI.fetchJson(`/api/inventory/location-map?${mapParams.toString()}`);
      renderSummary(latestMapPayload.summary || {});
      renderMap(latestMapPayload);
      renderBuckets(latestMapPayload.buckets || {});
      renderLocations(latestLocationsPayload.locations || []);
      if (selectedCell && !findCellByCode(selectedCell.location_code)) {
        selectCell(null);
      } else {
        renderSelectedDetails();
      }
    }

    async function adjustSelected() {
      const sourceRow = sourceRowForSelection();
      if (!sourceRow || !userCanManageInventory) return;
      await AuthUI.fetchJson(`/api/inventory/locations/${sourceRow.id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          quantity: Number(document.querySelector('#adjustQty').value),
          reason: document.querySelector('#adjustReason').value,
        }),
      });
      await loadInventory();
    }

    async function moveSelected() {
      const sourceRow = sourceRowForSelection();
      if (!sourceRow) {
        document.querySelector('#selectedInfo').textContent = tr('inventory.move.selectMaterial');
        return;
      }
      await AuthUI.fetchJson('/api/inventory/move', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          source_location_id: sourceRow.id,
          target_location_code: document.querySelector('#moveTarget').value,
          quantity: Number(document.querySelector('#moveQty').value),
          target_location_kind: document.querySelector('#moveKind').value,
          reason: document.querySelector('#moveReason').value || '整理库位',
        }),
      });
      await loadInventory();
    }

    async function bootInventory() {
      const user = await AuthUI.currentUser();
      if (!user) {
        AuthUI.redirectToLogin();
        return;
      }
      userCanManageInventory = AuthUI.hasCapability(user, 'can_manage_inventory');
      document.querySelector('#adjustmentPanel').hidden = !userCanManageInventory;
      document.querySelector('#inventoryContent').hidden = false;
      await loadInventory();
    }

    document.querySelector('#refreshBtn').addEventListener('click', loadInventory);
    document.querySelector('#applyFilterBtn').addEventListener('click', loadInventory);
    document.querySelector('#adjustBtn').addEventListener('click', () => {
      adjustSelected().catch((error) => { document.querySelector('#selectedInfo').textContent = error.message; });
    });
    document.querySelector('#moveBtn').addEventListener('click', () => {
      moveSelected().catch((error) => { document.querySelector('#selectedInfo').textContent = error.message; });
    });
    document.querySelector('#logoutBtn').addEventListener('click', async () => {
      await AuthUI.logout();
      window.location.href = '/login';
    });

    I18n.init().then(bootInventory);
    window.addEventListener('i18n:change', () => {
      if (latestMapPayload && latestLocationsPayload) {
        renderSummary(latestMapPayload.summary || {});
        renderMap(latestMapPayload);
        renderBuckets(latestMapPayload.buckets || {});
        renderLocations(latestLocationsPayload.locations || []);
        renderSelectedDetails();
      }
    });
  </script>
</body>
</html>
