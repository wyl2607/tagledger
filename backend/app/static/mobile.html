<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>手机录入 - Machine Label OCR</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f8f5;
      color: #172124;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #f7f8f5; }
    a { color: inherit; text-decoration: none; }
    header { position: sticky; top: 0; z-index: 10; background: rgba(247, 248, 245, .96); border-bottom: 1px solid #dce2df; padding: calc(12px + env(safe-area-inset-top)) 16px 12px; backdrop-filter: blur(14px); }
    nav { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: center; max-width: 520px; margin: 0 auto; }
    .brand { font-weight: 950; font-size: 18px; }
    .nav-link { min-height: 34px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid #d0d8d5; border-radius: 8px; padding: 0 10px; background: #fff; font-size: 13px; font-weight: 900; }
    main { max-width: 520px; margin: 0 auto; padding: 16px 16px calc(100px + env(safe-area-inset-bottom)); }
    .panel { background: #fff; border: 1px solid #dce2df; border-radius: 8px; padding: 16px; margin-bottom: 14px; box-shadow: 0 12px 28px rgba(23, 33, 36, .06); }
    h1, h2 { margin: 0; line-height: 1.1; }
    h1 { font-size: 26px; }
    h2 { font-size: 19px; margin-bottom: 12px; }
    .muted { color: #657275; font-size: 13px; line-height: 1.45; }
    label { display: block; font-size: 13px; font-weight: 900; color: #344245; margin: 13px 0 7px; }
    input, select, button, textarea { width: 100%; min-height: 48px; border-radius: 8px; border: 1px solid #c8d1ce; padding: 12px 13px; font-size: 17px; background: #fff; color: #172124; }
    input[type="file"].visually-hidden { position: absolute; inline-size: 1px; block-size: 1px; opacity: 0; pointer-events: none; }
    button { border: 0; background: #172124; color: #fff; cursor: pointer; font-weight: 950; }
    button.secondary { background: #e9eeec; color: #172124; }
    button.danger { background: #8d2b20; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .hero { display: grid; gap: 10px; }
    .hero p { margin: 0; }
    .preview { width: 100%; aspect-ratio: 4 / 3; border: 1px dashed #bac5c1; border-radius: 8px; background: #eef2f0; display: grid; place-items: center; overflow: hidden; color: #657275; font-weight: 800; text-align: center; padding: 12px; }
    .preview img { width: 100%; height: 100%; object-fit: contain; background: #111; }
    .capture-actions { display: grid; grid-template-columns: 1.35fr .9fr; gap: 10px; margin-top: 12px; }
    .capture-primary { min-height: 64px; font-size: 22px; }
    .auto-note { margin-top: 8px; font-size: 13px; color: #657275; font-weight: 800; }
    .status-card { display: grid; grid-template-columns: auto 1fr; gap: 10px; align-items: center; border-radius: 8px; padding: 12px; background: #eef6ff; color: #153e66; font-weight: 900; margin-top: 12px; }
    .status-card[hidden], .alert[hidden], .result[hidden], .recent[hidden] { display: none; }
    .spinner { width: 24px; height: 24px; border: 3px solid rgba(21, 62, 102, .2); border-top-color: #153e66; border-radius: 999px; animation: spin .8s linear infinite; }
    .alert { border-radius: 8px; padding: 12px; margin-top: 12px; font-weight: 850; line-height: 1.45; }
    .alert-red { background: #fff0ee; color: #8d2b20; border: 1px solid #e7aaa2; }
    .alert-yellow { background: #fff5c9; color: #6b4a00; border: 1px solid #e5c55e; }
    .alert-blue { background: #eef6ff; color: #153e66; border: 1px solid #9fc4ed; }
    .result { display: grid; gap: 12px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .pill { display: inline-flex; align-items: center; min-height: 28px; border-radius: 999px; padding: 4px 9px; background: #e9eeec; color: #344245; font-size: 12px; font-weight: 950; }
    .pill-green { background: #daf2e4; color: #14613a; }
    .pill-yellow { background: #fff3bd; color: #6b4a00; }
    .pill-red { background: #ffe1dd; color: #8d2b20; }
    .pill-blue { background: #dceeff; color: #153e66; }
    .barcode-list { display: grid; gap: 8px; }
    .barcode { border: 1px solid #dce2df; border-radius: 8px; padding: 10px; background: #fbfcfb; }
    .barcode strong, .record strong { display: block; overflow-wrap: anywhere; }
    .barcode span, .record span { display: block; margin-top: 2px; color: #657275; font-size: 13px; overflow-wrap: anywhere; }
    .barcode-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .barcode-actions button { min-height: 38px; font-size: 13px; }
    .sticky-actions { position: fixed; left: 0; right: 0; bottom: 0; z-index: 20; padding: 10px 16px calc(10px + env(safe-area-inset-bottom)); background: rgba(247, 248, 245, .96); border-top: 1px solid #dce2df; backdrop-filter: blur(14px); }
    .sticky-actions-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 520px; margin: 0 auto; }
    .sticky-actions-inner.single { grid-template-columns: 1fr; }
    .recent-list { display: grid; gap: 8px; }
    .record { text-align: left; border: 1px solid #dce2df; background: #fbfcfb; border-radius: 8px; padding: 11px; }
    .empty { border: 1px dashed #c8d1ce; border-radius: 8px; padding: 13px; color: #657275; font-size: 14px; text-align: center; }
    details.raw-ocr { border: 1px solid #dce2df; border-radius: 8px; background: #fbfcfb; padding: 11px; }
    details.raw-ocr summary { cursor: pointer; font-weight: 950; color: #344245; }
    .raw-text { white-space: pre-wrap; overflow-wrap: anywhere; margin: 10px 0 0; max-height: 260px; overflow: auto; color: #4d5b5e; font-size: 13px; line-height: 1.45; }
    .result-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 360px) {
      h1 { font-size: 23px; }
      input, select, button { font-size: 16px; }
      .row, .capture-actions, .sticky-actions-inner { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <nav aria-label="主导航">
      <a class="brand" href="/mobile" aria-current="page">手机录入</a>
      <a class="nav-link" href="/">桌面版</a>
      <a class="nav-link" href="/history">历史</a>
    </nav>
  </header>

  <main>
    <section class="panel hero">
      <h1>拍标签，确认入库</h1>
      <p class="muted">手机测试版：先跑通现场拍照、OCR、人工修正和确认入库。</p>
      <div class="meta">
        <span class="pill">局域网 Web</span>
        <span class="pill">Tesseract / 条码</span>
        <span class="pill">SQLite 入库</span>
      </div>
      <div class="meta" id="runtimeMeta" aria-label="运行状态"></div>
    </section>

    <section class="panel">
      <h2>1. 拍照上传</h2>
      <form id="uploadForm">
        <label for="category">品类</label>
        <select id="category" name="category" required>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
        </select>

        <label>标签照片</label>
        <input id="cameraFile" class="visually-hidden" name="cameraFile" type="file" accept="image/*,.jpg,.jpeg,.png,.webp" capture="environment">
        <input id="galleryFile" class="visually-hidden" name="galleryFile" type="file" accept="image/*,.jpg,.jpeg,.png,.webp">
        <div class="capture-actions">
          <button class="capture-primary" id="cameraBtn" type="button">拍照识别</button>
          <button class="secondary" id="galleryBtn" type="button">选择图片</button>
        </div>
        <div class="auto-note">拍照确认后会自动上传识别；选择图片后可先预览，再点底部上传。</div>
        <div class="preview" id="preview">拍一张清晰、完整、正对标签的照片</div>

        <div class="status-card" id="processing" hidden>
          <div class="spinner" aria-hidden="true"></div>
          <div id="processingText">识别中...</div>
        </div>
        <div class="alert alert-red" id="errorBox" role="alert" hidden></div>
      </form>
    </section>

    <section class="panel result" id="resultPanel" hidden>
      <div>
        <h2>2. 核对结果</h2>
        <div class="meta" id="recordMeta"></div>
      </div>
      <input id="recordId" type="hidden">
      <div class="alert alert-yellow" id="reviewBox" hidden></div>
      <div class="alert alert-blue" id="statusHelpBox" hidden></div>
      <div class="alert alert-blue" id="duplicateBox" hidden></div>

      <div>
        <label for="model">Model</label>
        <input id="model" autocomplete="off" inputmode="text">
      </div>
      <div>
        <label for="vin">VIN/BIN</label>
        <input id="vin" autocomplete="off" inputmode="text">
      </div>
      <div>
        <label for="sn">SN</label>
        <input id="sn" autocomplete="off" inputmode="text">
      </div>
      <div class="row">
        <div>
          <label for="confirmCategory">确认品类</label>
          <select id="confirmCategory">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </div>
        <div>
          <label for="duplicateAction">重复处理</label>
          <select id="duplicateAction">
            <option value="abandon">放弃新记录</option>
            <option value="overwrite">覆盖旧记录</option>
          </select>
        </div>
      </div>

      <div>
        <label>条码识别</label>
        <div class="barcode-list" id="barcodes">
          <div class="empty">未识别到条码</div>
        </div>
      </div>
      <details class="raw-ocr">
        <summary>OCR 原文</summary>
        <pre class="raw-text" id="rawOcrText">暂无 OCR 原文</pre>
      </details>
      <div class="result-actions">
        <button class="secondary" id="retakeInlineBtn" type="button">重拍</button>
        <a class="nav-link" href="/history">查看历史</a>
      </div>
    </section>

    <section class="panel recent" id="recentPanel">
      <h2>最近记录</h2>
      <div class="recent-list" id="recentRecords">
        <div class="empty">暂无记录</div>
      </div>
    </section>
  </main>

  <div class="sticky-actions">
    <div class="sticky-actions-inner" id="stickyActions">
      <button id="primaryBtn" type="button">上传并识别</button>
      <button class="secondary" id="nextBtn" type="button">继续拍下一台</button>
    </div>
  </div>

  <script>
    const uploadForm = document.querySelector('#uploadForm');
    const cameraFile = document.querySelector('#cameraFile');
    const galleryFile = document.querySelector('#galleryFile');
    const cameraBtn = document.querySelector('#cameraBtn');
    const galleryBtn = document.querySelector('#galleryBtn');
    const preview = document.querySelector('#preview');
    const processing = document.querySelector('#processing');
    const processingText = document.querySelector('#processingText');
    const errorBox = document.querySelector('#errorBox');
    const resultPanel = document.querySelector('#resultPanel');
    const recordMeta = document.querySelector('#recordMeta');
    const reviewBox = document.querySelector('#reviewBox');
    const statusHelpBox = document.querySelector('#statusHelpBox');
    const duplicateBox = document.querySelector('#duplicateBox');
    const rawOcrText = document.querySelector('#rawOcrText');
    const barcodes = document.querySelector('#barcodes');
    const recentRecords = document.querySelector('#recentRecords');
    const runtimeMeta = document.querySelector('#runtimeMeta');
    const primaryBtn = document.querySelector('#primaryBtn');
    const nextBtn = document.querySelector('#nextBtn');
    const retakeInlineBtn = document.querySelector('#retakeInlineBtn');
    const stickyActions = document.querySelector('#stickyActions');
    let mode = 'upload';
    let selectedPreviewUrl = null;
    let selectedFile = null;
    let currentRecord = null;
    let pollTimer = null;
    let uploadInFlight = false;
    let lastAutoUploadedSignature = '';

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]));
    }

    function setAlert(node, html) {
      node.innerHTML = html || '';
      node.hidden = !html;
    }

    async function requestJson(url, options) {
      const response = await fetch(url, options);
      const text = await response.text();
      let data = null;
      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        data = { detail: text || `HTTP ${response.status}` };
      }
      if (!response.ok) {
        const error = new Error(data?.detail || `HTTP ${response.status}`);
        error.status = response.status;
        throw error;
      }
      return data;
    }

    function setMode(nextMode) {
      mode = nextMode;
      if (mode === 'confirm') {
        primaryBtn.textContent = '确认本地入库';
        nextBtn.hidden = false;
        stickyActions.classList.remove('single');
      } else {
        primaryBtn.textContent = '上传并识别';
        nextBtn.hidden = true;
        stickyActions.classList.add('single');
      }
    }

    function renderRuntimeStatus(settings) {
      const saasText = settings.enable_saas_submit ? 'SaaS 提交开' : 'SaaS 提交关';
      const dryRunText = settings.dry_run ? 'dry-run' : '真实提交';
      runtimeMeta.innerHTML = `
        <span class="pill pill-blue">OCR: ${escapeHtml(settings.ocr_provider || 'unknown')}</span>
        <span class="pill ${settings.enable_barcode ? 'pill-green' : 'pill-yellow'}">条码: ${settings.enable_barcode ? '开' : '关'}</span>
        <span class="pill ${settings.enable_saas_submit ? 'pill-yellow' : 'pill-green'}">${saasText}</span>
        <span class="pill">${dryRunText}</span>
      `;
    }

    async function loadRuntimeStatus() {
      try {
        renderRuntimeStatus(await requestJson('/runtime/status'));
      } catch {
        runtimeMeta.innerHTML = '<span class="pill pill-yellow">运行状态读取失败</span>';
      }
    }

    function clearPolling() {
      if (pollTimer) {
        clearTimeout(pollTimer);
        pollTimer = null;
      }
    }

    function compressImage(file, maxDimension = 1600, quality = 0.85) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            if (width <= maxDimension && height <= maxDimension) {
              resolve(file);
              return;
            }
            if (width > height) {
              height = Math.round((height / width) * maxDimension);
              width = maxDimension;
            } else {
              width = Math.round((width / height) * maxDimension);
              height = maxDimension;
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob((blob) => {
              if (!blob) {
                reject(new Error('压缩失败'));
                return;
              }
              const compressed = new File([blob], file.name, { type: 'image/jpeg' });
              resolve(compressed);
            }, 'image/jpeg', quality);
          };
          img.onerror = () => reject(new Error('图片加载失败'));
          img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error('文件读取失败'));
        reader.readAsDataURL(file);
      });
    }

    function showProcessing(message) {
      processing.hidden = false;
      processingText.textContent = message;
    }

    function hideProcessing() {
      processing.hidden = true;
    }

    function uploadWithProgress(formData) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/upload');
        xhr.upload.addEventListener('progress', (event) => {
          if (!event.lengthComputable) {
            showProcessing('上传中...');
            return;
          }
          const percent = Math.min(100, Math.round((event.loaded / event.total) * 100));
          showProcessing(`上传中 ${percent}%`);
        });
        xhr.addEventListener('load', () => {
          let data = null;
          try {
            data = xhr.responseText ? JSON.parse(xhr.responseText) : null;
          } catch {
            data = { detail: xhr.responseText || `HTTP ${xhr.status}` };
          }
          if (xhr.status >= 200 && xhr.status < 300) {
            resolve(data);
          } else {
            const error = new Error(data?.detail || `HTTP ${xhr.status}`);
            error.status = xhr.status;
            reject(error);
          }
        });
        xhr.addEventListener('error', () => reject(new Error('网络错误')));
        xhr.addEventListener('timeout', () => reject(new Error('上传超时')));
        xhr.timeout = 45000;
        xhr.send(formData);
      });
    }

    function sleep(ms) {
      return new Promise((resolve) => {
        pollTimer = setTimeout(resolve, ms);
      });
    }

    async function pollJobUntilReady(id) {
      const startedAt = Date.now();
      while (Date.now() - startedAt < 45000) {
        const elapsed = Math.floor((Date.now() - startedAt) / 1000);
        showProcessing(`识别中，已用 ${elapsed} 秒`);
        const record = await requestJson(`/jobs/${id}`);
        if (record.status !== 'uploaded') {
          clearPolling();
          return record;
        }
        await sleep(900);
      }
      throw new Error('识别超时，请重拍或稍后重试');
    }

    function statusPill(record) {
      const tone = record.status === 'ocr_done' || record.status === 'confirmed'
        ? 'pill-green'
        : (record.status === 'needs_review' ? 'pill-yellow' : 'pill-red');
      return `<span class="pill ${tone}">${escapeHtml(record.status)}</span>`;
    }

    function completionButtonText(status) {
      if (status === 'confirmed') return '已入库';
      if (status === 'duplicate') return '已标记重复';
      if (status === 'submitted') return '已提交';
      return '已处理';
    }

    function statusHelp(record) {
      const messages = {
        uploaded: '图片已上传，正在等待 OCR。',
        ocr_done: '已完成本地 OCR，请核对字段后确认本地入库。',
        needs_review: '识别结果不完整，建议重拍或手动补齐字段。',
        duplicate: '发现重复记录。测试时出现 duplicate 是正常的，可按需要覆盖或放弃。',
        confirmed: '已完成本地入库。SaaS 提交当前默认关闭，不影响手机测试。',
        submitted: '已提交到 SaaS。',
        submission_failed: 'SaaS 提交失败或 dry-run 环境缺失；本地 OCR/入库测试仍可继续。',
      };
      return messages[record.status] || `当前状态：${record.status}`;
    }

    function isEmptyResult(record) {
      return !record.model && !record.vin_or_bin && !record.serial_number;
    }

    function renderBarcodes(items) {
      barcodes.innerHTML = '';
      if (!items || !items.length) {
        barcodes.innerHTML = '<div class="empty">未识别到条码</div>';
        return;
      }
      for (const item of items) {
        const div = document.createElement('div');
        div.className = 'barcode';
        div.innerHTML = `
          <strong>${escapeHtml(item.type || 'BARCODE')}</strong>
          <span>${escapeHtml(item.data)}</span>
          <div class="barcode-actions">
            <button class="secondary" type="button" data-target="vin">填到 VIN</button>
            <button class="secondary" type="button" data-target="sn">填到 SN</button>
          </div>
        `;
        div.querySelector('[data-target="vin"]').addEventListener('click', () => {
          document.querySelector('#vin').value = item.data || '';
        });
        div.querySelector('[data-target="sn"]').addEventListener('click', () => {
          document.querySelector('#sn').value = item.data || '';
        });
        barcodes.appendChild(div);
      }
    }

    function renderDuplicate(record, fallbackDuplicates = []) {
      const duplicates = record.duplicates && record.duplicates.length ? record.duplicates : fallbackDuplicates;
      if (!duplicates.length && record.status !== 'duplicate') {
        setAlert(duplicateBox, '');
        return;
      }
      const detail = duplicates.length
        ? duplicates.map((item) => `#${item.id} ${item.model || '-'} / ${item.vin_or_bin || '-'} / ${item.serial_number || '-'}`).join('<br>')
        : '发现重复记录，请选择覆盖旧记录或放弃新记录。';
      setAlert(duplicateBox, `<strong>重复提醒</strong><br>${detail}`);
    }

    function fillRecord(record, fallbackDuplicates = []) {
      currentRecord = record;
      document.querySelector('#recordId').value = record.id;
      document.querySelector('#model').value = record.model || '';
      document.querySelector('#vin').value = record.vin_or_bin || '';
      document.querySelector('#sn').value = record.serial_number || '';
      document.querySelector('#confirmCategory').value = record.category;
      recordMeta.innerHTML = `${statusPill(record)}<span class="pill">#${record.id}</span><span class="pill">品类 ${record.category}</span>`;
      renderBarcodes(record.barcodes || []);
      renderDuplicate(record, fallbackDuplicates);
      rawOcrText.textContent = record.raw_ocr_text || '暂无 OCR 原文';
      setAlert(statusHelpBox, statusHelp(record));
      if (record.status === 'needs_review' || isEmptyResult(record)) {
        setAlert(reviewBox, '识别结果不完整，请核对照片、重拍，或手动补字段。');
      } else {
        setAlert(reviewBox, '');
      }
      resultPanel.hidden = false;
      resultPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
      setMode('confirm');
    }

    async function uploadCurrentPhoto() {
      if (uploadInFlight) return;
      if (!selectedFile) {
        setAlert(errorBox, '请先拍照或选择一张标签图片。');
        return;
      }
      uploadInFlight = true;
      primaryBtn.disabled = true;
      cameraBtn.disabled = true;
      galleryBtn.disabled = true;
      setAlert(errorBox, '');
      setAlert(reviewBox, '');
      setAlert(statusHelpBox, '');
      setAlert(duplicateBox, '');
      resultPanel.hidden = true;
      try {
        const originalFile = selectedFile;
        showProcessing('压缩图片...');
        const compressedFile = await compressImage(originalFile);
        const sizeNote = originalFile !== compressedFile
          ? ` (${(originalFile.size/1024/1024).toFixed(1)}MB → ${(compressedFile.size/1024).toFixed(0)}KB)`
          : '';
        const formData = new FormData();
        formData.append('category', document.querySelector('#category').value);
        formData.append('file', compressedFile, originalFile.name);
        const upload = await uploadWithProgress(formData);
        showProcessing(`上传完成${sizeNote}，记录 #${upload.job_id}`);
        const record = upload.status === 'uploaded'
          ? await pollJobUntilReady(upload.job_id)
          : await requestJson(`/jobs/${upload.job_id}`);
        hideProcessing();
        fillRecord(record, upload.duplicates || []);
        await loadRecent();
      } catch (error) {
        hideProcessing();
        const message = error.status === 415 ? '只支持 jpg/jpeg/png/webp 图片。' : error.message;
        setAlert(errorBox, message || '上传失败，请重试。');
      } finally {
        uploadInFlight = false;
        primaryBtn.disabled = false;
        cameraBtn.disabled = false;
        galleryBtn.disabled = false;
      }
    }

    async function confirmCurrentRecord() {
      const id = document.querySelector('#recordId').value;
      if (!id) return;
      setAlert(errorBox, '');
      const payload = {
        category: document.querySelector('#confirmCategory').value,
        model: document.querySelector('#model').value,
        vin_or_bin: document.querySelector('#vin').value,
        serial_number: document.querySelector('#sn').value,
        duplicate_action: document.querySelector('#duplicateAction').value,
      };
      if (!payload.vin_or_bin.trim() && !payload.serial_number.trim()) {
        setAlert(errorBox, 'VIN/BIN 和 SN 至少填一个，再确认入库。');
        return;
      }
      primaryBtn.disabled = true;
      try {
        const result = await requestJson(`/confirm/${id}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        setAlert(reviewBox, '');
        setAlert(duplicateBox, result.duplicates && result.duplicates.length ? '已按重复策略处理。' : '');
        const finalRecord = { ...currentRecord, id: result.id, status: result.status };
        recordMeta.innerHTML = `${statusPill(finalRecord)}<span class="pill">#${result.id}</span>`;
        currentRecord = { ...currentRecord, status: result.status };
        primaryBtn.textContent = completionButtonText(result.status);
        primaryBtn.disabled = true;
        await loadRecent(result.status === 'confirmed' ? 'confirmed' : '');
      } catch (error) {
        setAlert(errorBox, `确认失败：${error.message}`);
      } finally {
        primaryBtn.disabled = ['confirmed', 'duplicate', 'submitted'].includes(currentRecord?.status);
      }
    }

    function resetForNext() {
      clearPolling();
      hideProcessing();
      setAlert(errorBox, '');
      setAlert(reviewBox, '');
      setAlert(statusHelpBox, '');
      setAlert(duplicateBox, '');
      resultPanel.hidden = true;
      uploadForm.reset();
      currentRecord = null;
      selectedFile = null;
      lastAutoUploadedSignature = '';
      primaryBtn.disabled = false;
      cameraBtn.disabled = false;
      galleryBtn.disabled = false;
      if (selectedPreviewUrl) {
        URL.revokeObjectURL(selectedPreviewUrl);
        selectedPreviewUrl = null;
      }
      preview.innerHTML = '拍一张清晰、完整、正对标签的照片';
      setMode('upload');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      cameraBtn.focus();
    }

    async function loadRecent(status = '') {
      const query = status ? `status=${encodeURIComponent(status)}&` : '';
      const rows = await requestJson(`/jobs?${query}limit=5&offset=0`);
      recentRecords.innerHTML = '';
      if (!rows.length) {
        recentRecords.innerHTML = '<div class="empty">暂无记录</div>';
        return;
      }
      for (const record of rows) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'record';
        button.innerHTML = `
          ${statusPill(record)}
          <strong>#${record.id} ${escapeHtml(record.model || '未识别 Model')}</strong>
          <span>VIN/BIN: ${escapeHtml(record.vin_or_bin || '-')}</span>
          <span>SN: ${escapeHtml(record.serial_number || '-')}</span>
        `;
        button.addEventListener('click', async () => {
          const full = await requestJson(`/jobs/${record.id}`);
          fillRecord(full);
        });
        recentRecords.appendChild(button);
      }
    }

    function fileSignature(file) {
      return file ? `${file.name}:${file.size}:${file.lastModified}` : '';
    }

    function handleFileSelected(file, options = {}) {
      if (selectedPreviewUrl) {
        URL.revokeObjectURL(selectedPreviewUrl);
        selectedPreviewUrl = null;
      }
      if (!file) {
        selectedFile = null;
        preview.innerHTML = '拍一张清晰、完整、正对标签的照片';
        return;
      }
      selectedFile = file;
      selectedPreviewUrl = URL.createObjectURL(file);
      preview.innerHTML = `<img src="${selectedPreviewUrl}" alt="标签照片预览">`;
      setAlert(errorBox, '');
      if (options.autoUpload) {
        const signature = fileSignature(file);
        if (signature && signature !== lastAutoUploadedSignature) {
          lastAutoUploadedSignature = signature;
          uploadCurrentPhoto();
        }
      }
    }

    cameraBtn.addEventListener('click', () => {
      cameraFile.click();
    });

    galleryBtn.addEventListener('click', () => {
      galleryFile.click();
    });

    cameraFile.addEventListener('change', () => handleFileSelected(cameraFile.files[0], { autoUpload: true }));
    galleryFile.addEventListener('change', () => handleFileSelected(galleryFile.files[0]));

    primaryBtn.addEventListener('click', () => {
      if (mode === 'confirm') {
        confirmCurrentRecord();
      } else {
        uploadCurrentPhoto();
      }
    });
    nextBtn.addEventListener('click', resetForNext);
    retakeInlineBtn.addEventListener('click', resetForNext);

    setMode('upload');
    loadRuntimeStatus();
    loadRecent().catch(() => {});
  </script>
</body>
</html>
